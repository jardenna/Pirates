<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <title>Kontakt</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/contact.css" />
</head>

<body>
  <article class="main-container">
    <header class="main-header">
      <div class="container">
        <nav id="mainNav" class="main-nav">
          <ul>
            <li class="nav-item"><a href="index.html">Hjem</a></li>
            <li class="nav-item"><a href="profil.html">Profil</a></li>
            <li class="nav-item"><a href="kontakt.html">Kontakt</a></li>
          </ul>
        </nav>
      </div>
    </header>
    <section class="container">


      <form class="main-form">
        <label for="navn">Navn</label>
        <input type="text" id="navn" name="navn" placeholder="Indtast dit navn" />

        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="Indtast dit password" />

        <label for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="Indtast din email" />
        <div class="error">Indtast venligst en rigtig email</div>

        <label for="year">Årstal</label>
        <input type="text" name="year" id="year" placeholder="Indtast årstal" />
        <div class="error">Indtast venligst et årstal</div>

        <label for="age">Alder</label>
        <input type="number" name="age" id="age" placeholder="Indtast din alder" />

        <label for="message">Besked</label>
        <textarea name="message" id="message" cols="30" rows="5"></textarea>


        <button type="submit">Send</button>
      </form>
    </section>
  </article>
  <script>
    const validYear = /^[1-9]\d{3,}$/i;
    const validEmail = /^[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}$/i;

    const form = document.querySelector("form");
    const emailInput = document.querySelector("form");
    const input = document.querySelectorAll("input");

    const inputArr = [...input];

    inputArr.forEach((input) =>
      input.addEventListener("blur", (e) => {
        const isEmailInput = e.target.type === 'email' && e.target.value !== '';
        const isYearInput = e.target.name === 'year' && e.target.value !== '';

        if (isYearInput && !e.target.value.match(validYear)) {
          alert('wrong Year!!!!')
        }

        if (isEmailInput && !e.target.value.match(validEmail)) {
          alert('wrong!!!!')
        }
      })
    );

    //  e.target.classList.toggle("test")

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      alert("Tak for din besked");
    });
  </script>

</body>

</html>
